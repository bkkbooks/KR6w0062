body:
  text: 觀音往昔塵沙劫成佛號曰正覺尊四𪪺誓慈悲重却𠁅莎婆會普門救衆生莫逢三及九橫大悲觀𠀍音菩會中有一菩起法號名曰無盡意殷勤合掌𥼶迦前為宣觀音義救衆生莫逢及九橫大悲觀𠀍爾時佛告盡意觀音裏難籌𥫫若暫皆得徐必能令超彼岸救衆生莫逢三及橫大悲鐺鍋弟子略懺煩𢙉鄣今當次第懺悔業能㽵餝𠀍趣在在是以思惟求離𠀍解脫所以六道果報種種不同形類各異當知皆是業力所作以佛十力中業力甚𭰹𭂫夫之人多於此中皆生疑何以故現見𠀍間行善之者如是十方盡空一切寶弟子無始以來至於今日長養煩𢙉日𭰹日厚日滋日茂覆蓋慧眼令無所見斷除衆善不得相續起鄣不得見佛不聞正法不值聖僧煩𢙉起鄣不見過去未來一切善𢙣業行是煩𢙉鄣受人天尊貴是煩𢙉鄣生色無色界禪定福樂是煩𢙉鄣不得自在神通飛騰隱顯遍至十方諸佛淨土聽法是煩𢙉鄣學安般息不淨觀諸煩𢙉鄣學慈慧喜舍因緣是煩𢙉鄣學七方便三觀是煩𢙉鄣學四念𤏙頂忍是煩𢙉鄣學聞思苐一法大德僧聽我比丘某甲當宇十五日宇郍於其中間眀鍾失時兼交不周絀亂大衆唯慈悲布施歡喜十五日以滿衆善聽大德僧聽衆善比丘某甲當為十五日宇郍於其中間恐兼交不周僧之是大德僧聽衆善比丘某甲當為十五日宇郍三內外監除上下宇郍𨐌巳年正月十日於何法律法律手上領得官分一拾伍石玖斗於僧正法律寫判官三人手上領得分一拾八石七斗於啓通上座手上領得分六十八石三斗官通計得粟一百兩石三斗領得常住粟一百一拾伍石肆斗通計粟一千㭍拾二石七斗官粟通六百伍拾七石七斗辛巳年八月七日見過粟陸伯拾六石
