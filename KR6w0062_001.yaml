body:
  text: 觀音往昔塵沙刼成佛号曰正覺尊四𪪺誓慈悲重却𠁅莎婆會普門救眾生莫逢三及九橫大悲觀𠀍音菩會中有一菩起法号名曰無盡意殷勤合掌𥼶迦前為宣觀音義救眾生莫逢及九橫大悲觀𠀍尒時佛告盡意觀音裏難籌𥫫若暫皆得徐必能令超彼岸救眾生莫逢三及橫大悲鐺鍋弟子略懺煩𢙉鄣今當次第懺悔業能㽵餝𠀍趣在在是以思惟求離𠀍觧脫所以六道果報種種不同形類各異當知皆是業力所作以佛十力中業力甚𭰹𭂫夫之人多於此中皆生疑何以故現見𠀍間行善之者如是十方盡空一切寶弟子无始以来至於今日長養煩𢙉日𭰹日厚日滋日茂覆盖慧眼令无所見断除眾善不得相續起鄣不得見佛不聞正法不值聖僧煩𢙉起鄣不見過去未来一切善𢙣業行是煩𢙉鄣受人天尊貴是煩𢙉鄣生色无色界禪定福樂是煩𢙉鄣不得自在神通飛騰隱顯遍至十方諸佛淨土聴法是煩𢙉鄣學安般息不淨觀諸煩𢙉鄣學慈慧喜舎因緣是煩𢙉鄣學七方便三觀是煩𢙉鄣學四念𤏙頂忍是煩𢙉鄣學聞思苐一法大德僧聴我比丘某甲當宇十五日宇郍於其中間眀鍾失時兼交不周絀乱大眾唯慈悲布施歡喜十五日以滿眾善聴大徳僧聴眾善比丘某甲當為十五日宇郍於其中間𢙢兼交不周僧之是大徳僧聴眾善比丘某甲當為十五日宇郍三內外監除上下宇郍𨐌巳年正月十日於何法律法律手上領得官分壹拾伍石玖斗於僧正法律冩判官三人手上領得分壹拾八石七斗於啟通上座手上領得分六十八石三斗官通計得粟壹百兩石三斗領得常住粟壹百壹拾伍石肆斗通計粟壹千㭍拾貳石七斗官粟通六百伍拾七石七斗辛巳年八月七日見過粟陸伯拾六石
